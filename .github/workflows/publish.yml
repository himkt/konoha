name: publish

on:
  release:
    types:
      - published

jobs:
  deploy:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    if: github.event_name == 'release'
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v7
    - run: |
        uv build
        uv publish
